version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gridpilot-postgres
    environment:
      POSTGRES_DB: gridpilot
      POSTGRES_USER: gridpilot_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridpilot_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gridpilot-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: gridpilot-chromadb
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: gridpilot-pgdata
  redisdata:
    name: gridpilot-redisdata
  chromadata:
    name: gridpilot-chromadata
