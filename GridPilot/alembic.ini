# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = services/db/migrations

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path pathplots to prepend to sys.path
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# version location specification; this defaults to services/db/migrations/versions.
# version_locations = %(here)s/services/db/migrations/versions

# the database URL is read dynamically from env.py, but we provide a local fallback here
sqlalchemy.url = postgresql+asyncpg://gridpilot_app:postgres_dev_password_change_me@localhost:5432/gridpilot

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(asctime)s [%%(levelname)s] %%(name)s: %%(message)s
datefmt = %%H:%%M:%%S
